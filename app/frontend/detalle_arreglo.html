<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Detalle Arreglo</title>

    <link rel="stylesheet"
          href="css/estilos.css">

</head>

<body>

    <h1>BloomLab</h1>

    <p>
        <a href="arreglos.html">
            ← Regresar a Arreglos
        </a>
    </p>

    <h2 id="nombre-arreglo"></h2>

    <p>
        <strong>Código:</strong>
        <span id="codigo"></span>
    </p>

    <p>
        <strong>Categoría:</strong>
        <span id="categoria"></span>
    </p>

    <p>
        <strong>Descripción:</strong>
        <span id="descripcion"></span>
    </p>

    <p>
        <strong>Costo Total:</strong>
        <span id="costo-total"></span>
    </p>

    <h3>Agregar Insumo</h3>

    <select id="insumo-select">
        <option value="">
            Seleccionar insumo
        </option>
    </select>

    <input
        type="number"
        id="cantidad"
        placeholder="Cantidad"
    />

    <input
        type="number"
        id="costo-real"
        placeholder="Costo Real"
        step="0.01"
    />

    <input
        type="text"
        id="observaciones"
        placeholder="Observaciones"
    />

    <button onclick="agregarInsumo()">
        Agregar
    </button>

    <hr>



    <table id="tabla-detalle">

        <thead>

            <tr>

                <th>Código</th>
                <th>Nombre</th>
                <th>Cantidad</th>
                <th>Costo Real</th>
                <th>Subtotal</th>
                <th>observaciones</th>
                <th>Acciones</th>

            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>

    <script src="js/detalle_arreglo.js"></script>

</body>

</html>
