<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>BloomLab - Insumos</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <h1>BloomLab</h1>

     <p>
    <a href="index.html">
        ← Menú Principal
    </a>
    </p>

    <h2>Catálogo de Insumos</h2>

    <h3>Nuevo Insumo</h3>

    <input
        type="text"
        id="nombre-insumo"
        placeholder="Nombre"
    />

    <select id="categoria-select">

        <option value="">
            Seleccionar categoría
        </option>

    </select>

    <input
        type="text"
        id="unidad"
        placeholder="Unidad"
    />

    <input
        type="number"
        id="costo-referencia"
        placeholder="Costo Referencia"
        step="0.01"
    />

    <input
        type="number"
        id="porcentaje-merma"
        placeholder="Merma"
        step="0.01"
    />

    <button onclick="crearInsumo()">
        Guardar
    </button>

    <hr>
    <table id="tabla-insumos">

        <thead>
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Unidad</th>
                <th>Costo</th>
                <th>Merma</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>

        </tbody>

    </table>

    <script src="js/insumos.js"></script>

</body>

</html>
